<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORLD MONITOR — Global Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#080c10;--s1:#0d1117;--s2:#161b22;--s3:#1c2128;
  --b1:#21262d;--b2:#30363d;--b3:#444c56;
  --t1:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --red:#f85149;--orange:#f0883e;--yellow:#e3b341;
  --green:#3fb950;--blue:#58a6ff;--cyan:#79c0ff;--purple:#bc8cff;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'IBM Plex Sans',sans-serif;font-size:13px;}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--b2);}
.app{display:flex;flex-direction:column;height:100vh;}
.main{flex:1;display:flex;min-height:0;}

/* TOPBAR */
.topbar{height:46px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:14px;z-index:500;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;}
.logo b{color:var(--red);}
.live{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--red);letter-spacing:2px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.clock{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--t2);}
.clock b{color:var(--t1);}
.sep{width:1px;height:20px;background:var(--b2);}
.pill{display:flex;align-items:center;gap:5px;padding:3px 9px;border:1px solid;border-radius:2px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;}
.pill-orange{color:var(--orange);border-color:rgba(240,136,62,.3);background:rgba(240,136,62,.06);}
.pill-red{color:var(--red);border-color:rgba(248,81,73,.35);background:rgba(248,81,73,.07);}
.topbar-stats{display:flex;gap:14px;}
.ts{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t2);}
.ts b{color:var(--t1);}
.ml{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{padding:4px 11px;background:transparent;border:1px solid var(--b2);color:var(--t2);font-family:'IBM Plex Mono',monospace;font-size:9px;transition:all .15s;letter-spacing:1px;border-radius:2px;}
.btn:hover{border-color:var(--b3);color:var(--t1);}

/* TICKER */
.ticker{height:25px;flex-shrink:0;background:rgba(248,81,73,.08);border-bottom:1px solid rgba(248,81,73,.15);display:flex;align-items:center;overflow:hidden;}
.ticker-tag{flex-shrink:0;background:var(--red);color:#000;height:100%;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;letter-spacing:2px;padding:0 12px;display:flex;align-items:center;gap:5px;}
.tdot{width:5px;height:5px;border-radius:50%;background:#000;animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.ticker-scroll{flex:1;overflow:hidden;white-space:nowrap;}
.ticker-text{display:inline-block;padding-left:100%;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--t2);animation:tickscroll 180s linear infinite;}
@keyframes tickscroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* SIDEBAR LEFT — oculto */
.sl{display:none;}
.phdr{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--s2);border-bottom:1px solid var(--b1);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--t2);cursor:pointer;user-select:none;flex-shrink:0;transition:color .15s;}
.phdr:hover{color:var(--t1);}
.phdr .arr{margin-left:auto;transition:transform .2s;}
.phdr.closed .arr{transform:rotate(-90deg);}
.pbody{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--b2) transparent;}
.pbody.closed{display:none;}

/* conflict list */
.ci{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid rgba(33,38,45,.5);}
.ci:hover{background:var(--s2);}
.ci.on{background:var(--s3);border-left:2px solid var(--blue);padding-left:10px;}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cdot.critical{background:var(--red);box-shadow:0 0 7px var(--red);animation:pulse 1.5s ease-in-out infinite;}
.cdot.high{background:var(--red);box-shadow:0 0 5px var(--red);}
.cdot.med{background:var(--orange);box-shadow:0 0 4px var(--orange);}
.cdot.low{background:var(--blue);}
.cdot.latent{background:var(--t3);}
.cinfo{flex:1;min-width:0;}
.cname{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.creg{font-size:9px;color:var(--t2);font-family:'IBM Plex Mono',monospace;margin-top:1px;}
.cbadge{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;padding:1px 5px;border-radius:2px;flex-shrink:0;letter-spacing:.5px;}
.bc{background:rgba(248,81,73,.2);color:var(--red);border:1px solid rgba(248,81,73,.25);}
.bh{background:rgba(248,81,73,.13);color:var(--red);}
.bm{background:rgba(240,136,62,.11);color:var(--orange);}
.bl{background:rgba(88,166,255,.1);color:var(--blue);}
.bn{background:rgba(72,79,88,.2);color:var(--t3);}

/* layers */
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:8px;}
.lbtn{display:flex;align-items:center;gap:5px;padding:5px 7px;border:1px solid var(--b2);border-radius:3px;background:transparent;font-size:10px;color:var(--t2);transition:all .15s;width:100%;text-align:left;}
.lbtn:hover{border-color:var(--b3);color:var(--t1);}
.lbtn.on{color:var(--t1);border-color:var(--b3);}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* stability */
.srow{display:flex;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid rgba(33,38,45,.4);}
.sname{width:80px;font-size:10px;color:var(--t2);flex-shrink:0;}
.sbg{flex:1;height:3px;background:var(--b1);border-radius:2px;overflow:hidden;}
.sbar{height:100%;border-radius:2px;transition:width 1s ease;}
.sval{width:22px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t2);}

/* MAP */
.map-wrap{flex:1;position:relative;display:flex;flex-direction:column;min-width:0;}
#map{flex:1;}
.leaflet-container{background:#0a0f14!important;}
@keyframes cp{0%,100%{box-shadow:0 0 0 0 rgba(248,81,73,.6)}50%{box-shadow:0 0 0 12px rgba(248,81,73,0)}}
@keyframes ch{0%,100%{box-shadow:0 0 0 0 rgba(248,81,73,.5)}50%{box-shadow:0 0 0 9px rgba(248,81,73,0)}}
@keyframes cm{0%,100%{box-shadow:0 0 0 0 rgba(240,136,62,.5)}50%{box-shadow:0 0 0 7px rgba(240,136,62,0)}}
@keyframes cl{0%,100%{box-shadow:0 0 0 0 rgba(88,166,255,.4)}50%{box-shadow:0 0 0 5px rgba(88,166,255,0)}}

.map-timebar{position:absolute;top:10px;left:10px;z-index:400;background:rgba(8,12,16,.9);border:1px solid var(--b1);border-radius:3px;display:flex;overflow:hidden;backdrop-filter:blur(4px);}
.tbtn{padding:4px 9px;background:transparent;border:none;border-right:1px solid var(--b1);color:var(--t2);font-family:'IBM Plex Mono',monospace;font-size:9px;transition:all .12s;}
.tbtn:last-child{border-right:none;}
.tbtn.on,.tbtn:hover{background:var(--s2);color:var(--t1);}

.map-zoombar{position:absolute;top:10px;right:10px;z-index:400;display:flex;flex-direction:column;gap:4px;}
.zbtn{width:28px;height:28px;background:rgba(8,12,16,.9);border:1px solid var(--b1);color:var(--t2);font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:3px;transition:all .15s;backdrop-filter:blur(4px);}
.zbtn:hover{color:var(--t1);border-color:var(--b3);}

.map-regionbar{position:absolute;bottom:0;left:0;right:0;z-index:400;background:rgba(8,12,16,.88);border-top:1px solid var(--b1);display:flex;align-items:center;height:32px;padding:0 12px;gap:4px;backdrop-filter:blur(4px);overflow-x:auto;scrollbar-width:none;}
.map-regionbar::-webkit-scrollbar{display:none;}
.rlabel{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--t3);letter-spacing:1px;flex-shrink:0;margin-right:4px;}
.rbtn{padding:2px 9px;background:transparent;border:1px solid var(--b2);color:var(--t2);font-family:'IBM Plex Mono',monospace;font-size:8px;transition:all .12s;border-radius:2px;white-space:nowrap;flex-shrink:0;}
.rbtn:hover,.rbtn.on{border-color:var(--blue);color:var(--blue);background:rgba(88,166,255,.05);}

.leaflet-popup-content-wrapper{background:var(--s2)!important;color:var(--t1)!important;border:1px solid var(--b2)!important;border-radius:4px!important;box-shadow:0 4px 24px rgba(0,0,0,.7)!important;}
.leaflet-popup-content{margin:10px 14px!important;}
.leaflet-popup-tip{background:var(--s2)!important;}
.leaflet-popup-close-button{color:var(--t2)!important;top:6px!important;right:8px!important;}
.pt{font-weight:600;font-size:13px;margin-bottom:3px;}
.ps{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t2);margin-bottom:6px;letter-spacing:.5px;}
.pb{font-size:10px;color:var(--t2);line-height:1.6;}
.pb b{color:var(--t1);}
.pu-tag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;padding:1px 6px;border-radius:2px;margin-top:7px;letter-spacing:1px;}

/* SIDEBAR RIGHT */
.sr{width:480px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;}

/* TABS */
.tabs{flex-shrink:0;display:flex;align-items:center;background:var(--s2);border-bottom:2px solid var(--b1);}
.tab{padding:8px 14px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--t2);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;transition:all .15s;margin-bottom:-2px;white-space:nowrap;}
.tab:hover{color:var(--t1);}
.tab.on{color:var(--t1);border-bottom-color:var(--blue);}
.tab-refresh{margin-left:auto;display:flex;align-items:center;gap:6px;padding-right:8px;}
.tab-timer{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);}
.tab-panel{display:flex;flex-direction:column;flex:1;min-height:0;}
.tab-panel.hidden{display:none;}

/* GDELT */
.gdelt-info{flex-shrink:0;padding:7px 12px;background:rgba(88,166,255,.04);border-bottom:1px solid rgba(88,166,255,.1);display:flex;flex-direction:column;gap:2px;}
.gdelt-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--blue);letter-spacing:1px;}
.gdelt-sub{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--t3);}
.gdelt-item{padding:9px 12px 8px;border-bottom:1px solid rgba(33,38,45,.55);cursor:pointer;transition:background .1s;animation:fadeup .3s ease both;}
.gdelt-item:hover{background:var(--s2);}
.gdelt-top{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.gdelt-tone{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;padding:1px 5px;border-radius:2px;}
.tone-neg{background:rgba(248,81,73,.15);color:var(--red);}
.tone-neu{background:rgba(139,148,158,.1);color:var(--t2);}
.tone-pos{background:rgba(63,185,80,.1);color:var(--green);}
.gdelt-src{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--t2);background:var(--s3);padding:1px 5px;border-radius:2px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gdelt-time{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--t3);}
.gdelt-title{font-size:12px;font-weight:500;color:var(--t1);line-height:1.4;margin-bottom:2px;}
.gdelt-loc{font-size:10px;color:var(--t2);}
.gdelt-loc b{color:var(--cyan);}

/* OSINT tag */
.tag-tg{background:rgba(36,161,222,.15);color:#24a1de;border:1px solid rgba(36,161,222,.2);}
.tag-osint{background:rgba(188,140,255,.12);color:var(--purple);}

/* feed */
.ffilters{flex-shrink:0;display:flex;gap:3px;padding:6px 8px;border-bottom:1px solid var(--b1);flex-wrap:wrap;}
.ffbtn{padding:2px 8px;background:transparent;border:1px solid var(--b2);border-radius:2px;color:var(--t2);font-family:'IBM Plex Mono',monospace;font-size:8px;transition:all .12s;letter-spacing:.5px;}
.ffbtn:hover,.ffbtn.on{border-color:var(--b3);color:var(--t1);background:var(--s2);}

/* feed source selector */
.fsource-bar{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid var(--b1);overflow-x:auto;scrollbar-width:none;}
.fsource-bar::-webkit-scrollbar{display:none;}
.fsrc-btn{padding:2px 7px;background:transparent;border:1px solid var(--b2);border-radius:2px;color:var(--t3);font-family:'IBM Plex Mono',monospace;font-size:7px;transition:all .12s;white-space:nowrap;flex-shrink:0;letter-spacing:.3px;}
.fsrc-btn:hover,.fsrc-btn.on{border-color:var(--green);color:var(--green);background:rgba(63,185,80,.05);}
.fsrc-label{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--t3);letter-spacing:1px;flex-shrink:0;}

.farea{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--b2) transparent;}
.farea::-webkit-scrollbar{width:2px;}

.fitem{padding:9px 12px 8px;border-bottom:1px solid rgba(33,38,45,.55);cursor:pointer;transition:background .1s;animation:fadeup .35s ease both;}
.fitem:hover{background:var(--s2);}
@keyframes fadeup{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ftop{display:flex;align-items:center;gap:4px;margin-bottom:4px;flex-wrap:wrap;}
.ftag{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;padding:1px 5px;border-radius:2px;letter-spacing:.5px;flex-shrink:0;}
.tag-b{background:rgba(248,81,73,.18);color:var(--red);border:1px solid rgba(248,81,73,.2);}
.tag-s{background:rgba(240,136,62,.13);color:var(--orange);}
.tag-d{background:rgba(88,166,255,.1);color:var(--blue);}
.tag-m{background:rgba(188,140,255,.1);color:var(--purple);}
.tag-i{background:rgba(121,192,255,.08);color:var(--cyan);}
.tag-e{background:rgba(63,185,80,.08);color:var(--green);}
.fsrc{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--t2);background:var(--s3);padding:1px 5px;border-radius:2px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ftime{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--t3);white-space:nowrap;}
.ftitle{font-size:12px;font-weight:500;color:var(--t1);line-height:1.4;margin-bottom:3px;}
.fdesc{font-size:11px;color:var(--t2);line-height:1.5;}
.fstatus{display:flex;align-items:center;justify-content:center;gap:8px;padding:28px 16px;color:var(--t3);font-family:'IBM Plex Mono',monospace;font-size:10px;flex-direction:column;}
.fstatus-detail{font-size:9px;color:var(--t3);font-family:'IBM Plex Mono',monospace;text-align:center;line-height:1.6;}
@keyframes spin{100%{transform:rotate(360deg)}}
.spin-sm{width:12px;height:12px;border:1px solid var(--b2);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}

/* feed footer */
.ffooter{flex-shrink:0;border-top:1px solid var(--b1);padding:5px 12px;display:flex;align-items:center;gap:8px;}
.ffooter-stat{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);}
.ffooter-stat b{color:var(--t2);}
.frefresh{margin-left:auto;padding:3px 10px;background:transparent;border:1px solid var(--b2);color:var(--t2);font-family:'IBM Plex Mono',monospace;font-size:8px;transition:all .15s;border-radius:2px;letter-spacing:1px;}
.frefresh:hover{border-color:var(--green);color:var(--green);}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">WORLD<b>MONITOR</b></div>
    <div class="live"><div class="live-dot"></div>LIVE</div>
    <div class="clock">UTC <b id="clock">--:--:--</b></div>
    <div class="sep"></div>
    <div class="pill pill-red" id="threat-pill">▲ CRÍTICO: 3 TEATROS ACTIVOS</div>
    <div class="sep"></div>
    <div class="topbar-stats">
      <span class="ts">CONFLICTOS <b id="st-c">21</b></span>
      <span class="ts">ALERTAS <b id="st-a" style="color:var(--red)">—</b></span>
      <span class="ts">NOTICIAS <b id="st-n" style="color:var(--green)">—</b></span>
    </div>
    <div class="ml">
      <button class="btn" id="ref-btn" onclick="loadFeed(true)">↻ ACTUALIZAR</button>
    </div>
  </div>

  <!-- TICKER -->
  <div class="ticker">
    <div class="ticker-tag"><div class="tdot"></div>FLASH</div>
    <div class="ticker-scroll"><span class="ticker-text" id="ticker">CONECTANDO CON FUENTES RSS — CARGANDO INTELIGENCIA EN TIEMPO REAL...</span></div>
  </div>

  <div class="main">

    <!-- LEFT SIDEBAR -->
    <div class="sl">
      <div class="phdr">● CONFLICTOS ACTIVOS // MAR 2026</div>
      <div style="flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--b2) transparent;">
        <div id="conflict-list"></div>
      </div>
    </div>

    <!-- MAP -->
    <div class="map-wrap">
      <div id="map"></div>

      <div class="map-timebar">
        <button class="tbtn" onclick="setTime(this)">1H</button>
        <button class="tbtn" onclick="setTime(this)">6H</button>
        <button class="tbtn on" onclick="setTime(this)">24H</button>
        <button class="tbtn" onclick="setTime(this)">48H</button>
        <button class="tbtn" onclick="setTime(this)">7D</button>
      </div>

      <div class="map-zoombar">
        <button class="zbtn" onclick="MAP.zoomIn()">+</button>
        <button class="zbtn" onclick="MAP.zoomOut()">−</button>
        <button class="zbtn" onclick="MAP.flyTo([20,15],2.5,{duration:1})">⊕</button>
      </div>

      <div class="map-regionbar">
        <span class="rlabel">REGIÓN</span>
        <button class="rbtn on"  onclick="setRegion(this,'global')">GLOBAL</button>
        <button class="rbtn"     onclick="setRegion(this,'europe')">EUROPA</button>
        <button class="rbtn"     onclick="setRegion(this,'mena')">MENA</button>
        <button class="rbtn"     onclick="setRegion(this,'africa')">ÁFRICA</button>
        <button class="rbtn"     onclick="setRegion(this,'asia')">ASIA-PAC</button>
        <button class="rbtn"     onclick="setRegion(this,'americas')">AMÉRICAS</button>
        <button class="rbtn"     onclick="setRegion(this,'caucasus')">CÁUCASO</button>
      </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div class="sr">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab on" onclick="switchTab('media',this)">📰 MEDIOS</button>
        <button class="tab"    onclick="switchTab('osint',this)">📲 OSINT/TELEGRAM</button>
        <div class="tab-refresh">
          <span id="refresh-countdown" class="tab-timer">↻ 2:00</span>
          <button class="frefresh" onclick="refreshAll(true)">REFRESH</button>
        </div>
      </div>

      <!-- MEDIA panel -->
      <div class="tab-panel" id="panel-media">
        <div class="ffilters">
          <button class="ffbtn on" onclick="filterCat('all',this,'media')">TODO</button>
          <button class="ffbtn"    onclick="filterCat('ukraine',this,'media')">UCRANIA</button>
          <button class="ffbtn"    onclick="filterCat('mideast',this,'media')">M.ESTE</button>
          <button class="ffbtn"    onclick="filterCat('africa',this,'media')">ÁFRICA</button>
          <button class="ffbtn"    onclick="filterCat('asia',this,'media')">ASIA</button>
          <button class="ffbtn"    onclick="filterCat('breaking',this,'media')">🔴 FLASH</button>
        </div>
        <div class="farea" id="feed-media">
          <div class="fstatus"><div class="spin-sm"></div>Cargando medios...</div>
        </div>
      </div>

      <!-- OSINT/TELEGRAM panel -->
      <div class="tab-panel hidden" id="panel-osint">
        <div class="ffilters">
          <button class="ffbtn on" onclick="filterCat('all',this,'osint')">TODO</button>

const CORS_PROXIES=[
  url=>`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url=>`https://corsproxy.io/?${encodeURIComponent(url)}`,
  url=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];
async function fetchRSS(url){
  for(const fn of CORS_PROXIES){
    try{
      const r=await fetch(fn(url),{signal:AbortSignal.timeout(10000)});
      if(!r.ok) continue;
      const text=await r.text();
      try{const j=JSON.parse(text);if(j.contents&&j.contents.length>100)return j.contents;}
      catch(e){if(text.length>100)return text;}
    }catch(e){}
  }
  return null;
}

// ══════════════════════════════════════════════════════════
// RSS PARSER
// ══════════════════════════════════════════════════════════
function parseRSS(xml,src,cat,type='rss'){
  const items=[],re=/<item[^>]*>([\s\S]*?)<\/item>/gi;
  let m;
  while((m=re.exec(xml))!==null){
    const b=m[1];
    const g=tag=>{const r=b.match(new RegExp(`<${tag}[^>]*>(?:<!\\[CDATA\\[)?(.*?)(?:\\]\\]>)?<\\/${tag}>`,'si'));return r?r[1].replace(/<[^>]+>/g,'').trim():'';};
    const title=g('title').slice(0,200),link=g('link')||g('guid');
    const pubDate=g('pubDate')||g('dc:date')||new Date().toUTCString();
    const desc=g('description').replace(/&[a-z]+;/g,' ').replace(/\s+/g,' ').trim().slice(0,200);
    if(title) items.push({title,link,pubDate,desc,src,cat,type});
  }
  if(!items.length){
    const re2=/<entry[^>]*>([\s\S]*?)<\/entry>/gi;
    while((m=re2.exec(xml))!==null){
      const b=m[1];
      const g=tag=>{const r=b.match(new RegExp(`<${tag}[^>]*>(?:<!\\[CDATA\\[)?(.*?)(?:\\]\\]>)?<\\/${tag}>`,'si'));return r?r[1].replace(/<[^>]+>/g,'').trim():'';};
      const title=g('title').slice(0,200),pubDate=g('updated')||g('published')||new Date().toUTCString();
      const desc=g('summary').replace(/&[a-z]+;/g,' ').trim().slice(0,200);
      const lm=b.match(/<link[^>]+href="([^"]+)"/i);
      if(title) items.push({title,link:lm?lm[1]:'',pubDate,desc,src,cat,type});
    }
  }
  return items.slice(0,12);
}

const CLASSIFY=t=>{
  t=t.toLowerCase();
  if(/breaking|flash|urgent|alert/.test(t)) return 'b';
  if(/attack|strike|bomb|missile|killed|dead|explos|casualt|shelling/.test(t)) return 's';
  if(/ceasefire|negotiat|talks|accord|deal|sanction|diplo|treaty/.test(t)) return 'd';
  if(/military|troops|forces|army|navy|fighter|weapon|tank|deploy/.test(t)) return 'm';
  if(/economy|market|trade|gdp|inflation|crisis|energy|oil|gas/.test(t)) return 'e';
  return 'i';
};
const REGION_KW={
  ukraine:/ukrain|russia|kyiv|moscow|donetsk|zaporizhzhia|kherson|kursk|kremlin|zelensky/i,
  mideast:/gaza|israel|hamas|idf|lebanon|iran|iraq|syria|yemen|houthi|tehran/i,
  africa:/africa|sudan|congo|somalia|mali|ethiopia|nigeria|sahel|chad|niger|burkina|rwanda/i,
  asia:/china|taiwan|korea|japan|myanmar|vietnam|philippin|asia|pacific|burma|beijing/i,
  americas:/venezuel|haiti|colombia|brazil|mexico|carib|latin|america/i,
};
const TAG={b:['tag-b','🔴 FLASH'],s:['tag-s','💥 STRIKE'],d:['tag-d','🕊 DIPLO'],m:['tag-m','⚔ MIL'],e:['tag-e','📈 ECON'],i:['tag-i','📡 INTEL']};

function timeAgo(s){
  const n=Date.now()-new Date(s);
  if(isNaN(n))return '?';
  if(n<60000)return 'ahora';
  if(n<3600000)return `${Math.floor(n/60000)}m`;
  if(n<86400000)return `${Math.floor(n/3600000)}h`;
  return `${Math.floor(n/86400000)}d`;
}

function renderItems(items,areaId){
  const area=document.getElementById(areaId);
  if(!items.length){area.innerHTML='<div class="fstatus" style="color:var(--t3)">Sin resultados.</div>';return;}
  area.innerHTML=items.slice(0,60).map((item,i)=>{
    const t=CLASSIFY(item.title),[cls,label]=TAG[t]||TAG['i'];
    const safeLink=(item.link||'').replace(/'/g,"\\'");
    const isTg=item.type==='tg';
    const tagHtml=isTg?`<span class="ftag tag-tg">📲 TELEGRAM</span>`:`<span class="ftag ${cls}">${label}</span>`;
    return `<div class="fitem" style="animation-delay:${Math.min(i,20)*0.025}s" ${safeLink?`onclick="window.open('${safeLink}','_blank')"`:''}>
      <div class="ftop">${tagHtml}<span class="fsrc">${item.src}</span><span class="ftime">${timeAgo(item.pubDate)}</span></div>
      <div class="ftitle">${item.title}</div>
      ${item.desc&&item.desc!==item.title?`<div class="fdesc">${item.desc}…</div>`:''}
    </div>`;
  }).join('');
}

// Parser HTML de t.me/s/canal
function parseTelegram(html, src, cat){
  const items=[];
  // Extraer mensajes del widget público de Telegram
  const msgRe=/<div class="tgme_widget_message_wrap[^"]*"[^>]*>([\s\S]*?)<\/div>\s*<\/div>\s*<\/div>/g;
  // Método más robusto: buscar bloques de mensaje por su estructura
  const textRe=/<div class="tgme_widget_message_text[^"]*"[^>]*>([\s\S]*?)<\/div>/g;
  const dateRe=/<time[^>]+datetime="([^"]+)"/g;
  const linkRe=/<a class="tgme_widget_message_date"[^>]+href="([^"]+)"/g;

  const texts=[], dates=[], links=[];
  let m;
  while((m=textRe.exec(html))!==null){
    const t=m[1].replace(/<br\s*\/?>/gi,' ').replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#\d+;/g,'').trim();
    if(t.length>5) texts.push(t);
  }
  while((m=dateRe.exec(html))!==null) dates.push(m[1]);
  while((m=linkRe.exec(html))!==null) links.push(m[1]);

  const count=Math.min(texts.length, 15);
  for(let i=0;i<count;i++){
    const title=texts[i].slice(0,200);
    const pubDate=dates[i]||new Date().toISOString();
    const link=links[i]||`https://t.me/s/${src}`;
    items.push({title,link,pubDate,desc:texts[i].slice(0,300),src,cat,type:'tg'});
  }
  return items;
}

function renderOSINT(){
  let items=osintCache.data;
  if(activeCatOsint!=='all'){const re=REGION_KW[activeCatOsint];if(re)items=items.filter(i=>re.test(i.title+' '+(i.desc||'')));}
  if(!items.length){
    document.getElementById('feed-osint').innerHTML='<div class="fstatus" style="color:var(--t3);flex-direction:column;gap:8px;">Sin datos de canales Telegram.<br><span style="font-size:9px">Algunos canales pueden estar bloqueados por el proxy CORS.</span></div>';
    return;
  }
  renderItems(items,'feed-osint');
}

function updateTicker(items){
  const top=items.slice(0,15).map(i=>`◉ ${i.title} [${i.src}]`).join('   ');
  document.getElementById('ticker').textContent=top||'SIN DATOS';
  const alerts=items.filter(i=>{const t=CLASSIFY(i.title);return t==='b'||t==='s';}).length;
  document.getElementById('st-n').textContent=items.length;
  document.getElementById('st-a').textContent=alerts;
  const now=new Date();
  document.getElementById('ft-updated').textContent=`${String(now.getUTCHours()).padStart(2,'0')}:${String(now.getUTCMinutes()).padStart(2,'0')} UTC`;
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
function init(){
  startClock();
  initMap();
  renderConflicts();
  startCountdown();
  loadMedia();
  loadOSINT();
}
init();
</script>
